services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_FILE=/src/data/database.sqlite
    volumes:
      - sqlite_data:/src/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL_INTERNAL=http://backend:5000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  sqlite_data: