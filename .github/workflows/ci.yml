name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projetfinal/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm install

      - name: Create environment file
        run: |
          echo "PORT=5000" > .env
          echo "JWT_SECRET=supersecretkey" >> .env
          echo "DB_FILE=./src/data/database.sqlite" >> .env

      - name: Create database folder
        run: mkdir -p src/data

      - name: Run backend unit tests
        run: npm test -- --passWithNoTests

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projetfinal/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://13.222.4.5:5000
          API_URL_INTERNAL: http://backend:5000
        run: npm run build

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./projetfinal/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/projetfinal-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/projetfinal-backend:dev

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./projetfinal/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/projetfinal-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/projetfinal-frontend:dev

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: projetfinal/backend/coverage
          if-no-files-found: ignore

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/banking-app
            docker compose pull
            docker compose up -d
            docker image prune -f
