name: CI

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projetfinal/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm install

      - name: Create environment file
        run: |
          echo "PORT=5000" > .env
          echo "JWT_SECRET=supersecretkey" >> .env
          echo "DB_FILE=./src/data/database.sqlite" >> .env

      - name: Create database folder
        run: mkdir -p src/data

      - name: Run backend unit tests with coverage
        run: npm test -- --coverage --passWithNoTests

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: projetfinal/backend/coverage
          if-no-files-found: ignore

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projetfinal/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          API_URL_INTERNAL: http://localhost:5000
        run: npm run build
